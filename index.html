<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunter Wortsalat 🥗</title>
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --primary: #4a90e2; --success: #47d147; --warning: #ffcc00; 
            --purple: #a29bfe; --dark: #2d3436; --error: #ff7675;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-grad); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        #app-container {
            background: rgba(255, 255, 255, 0.95); width: 95%; max-width: 600px; padding: 40px;
            border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            position: relative; overflow: hidden; border: 4px solid white;
        }
        .screen { display: none; }
        .screen.active { display: block; animation: zoomIn 0.3s ease-out; }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Herní rozložení */
        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .status-badge { background: var(--dark); color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        
        .game-layout { display: flex; align-items: flex-start; gap: 25px; margin: 40px 0; min-height: 150px; }
        
        /* Sloupec s nápovědami */
        .hints-column { display: flex; flex-direction: column; gap: 15px; width: 80px; }
        .hint-group { text-align: center; }
        .hint-btn {
            width: 60px; height: 60px; border-radius: 15px; border: none;
            background: var(--purple); color: white; cursor: pointer;
            font-size: 24px; transition: 0.3s; box-shadow: 0 4px 0 #6c5ce7;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .hint-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #6c5ce7; }
        .hint-btn:disabled { background: #dfe6e9; color: #b2bec3; box-shadow: 0 4px 0 #b2bec3; cursor: not-allowed; }
        .hint-label { font-size: 10px; font-weight: bold; margin-top: 5px; color: #636e72; display: block; }

        /* Písmena */
        #letters-container { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-content: center; flex-grow: 1; }
        .letter {
            width: 55px; height: 55px; background: var(--primary);
            color: white; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; font-size: 26px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
            box-shadow: 0 5px 0 #2980b9; text-transform: uppercase;
        }
        .letter:hover:not(.locked) { transform: translateY(-2px); background: #357abd; }
        .letter.selected { background: var(--warning); color: #333; box-shadow: 0 5px 0 #d4ac0d; }
        .letter.correct-state { background: var(--success); box-shadow: 0 5px 0 #2d922d; cursor: default; animation: bounce 0.5s; }
        .letter.locked { background: #b2bec3; cursor: default; box-shadow: 0 5px 0 #7f8c8d; }
        
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Navigace */
        .nav-bar { display: flex; justify-content: space-between; gap: 20px; margin-top: 30px; }
        .btn-round { 
            flex: 1; padding: 15px; border: none; border-radius: 15px; cursor: pointer;
            font-weight: bold; font-size: 16px; color: white; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-prev { background: #636e72; }
        .btn-next { background: var(--primary); }
        .btn-finish { background: var(--success); width: 100%; margin-top: 20px; display: none; }
        .btn-round:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Částice */
        .particle { position: absolute; pointer-events: none; width: 8px; height: 8px; border-radius: 2px; animation: fly 0.8s ease-out forwards; }
        @keyframes fly { to { transform: translate(var(--x), var(--y)) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

<div id="app-container">
    
    <div id="start-screen" class="screen active">
        <h1 style="font-size: 40px;">Wortsalat 🥗🇩🇪</h1>
        <p>Bringe die Buchstaben in die richtige Reihenfolge!</p>
        <div style="background: #fff3cd; padding: 15px; border-radius: 15px; font-size: 14px; color: #856404; margin: 20px 0;">
            💡 <strong>Tipp:</strong> Bewege Buchstaben, um Hilfe freizuschalten!<br>
            🔓 10 Züge = Erster Buchstabe<br>
            🔓 30 Züge = Letzter Buchstabe
        </div>
        <button class="btn-round btn-next" onclick="startGame('normal')">Spiel Starten 🚀</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <span class="status-badge" id="progress">Wort 1/20</span>
            <span id="timer" style="font-family: monospace; font-size: 20px; font-weight: bold; color: var(--error);">00:00</span>
        </div>

        <div class="game-layout">
            <div class="hints-column">
                <div class="hint-group">
                    <button id="hint-1" class="hint-btn" onclick="useHint(1)" disabled>💡</button>
                    <span class="hint-label" id="hint-1-label">0/10</span>
                </div>
                <div class="hint-group">
                    <button id="hint-2" class="hint-btn" onclick="useHint(2)" disabled>🎯</button>
                    <span class="hint-label" id="hint-2-label">0/30</span>
                </div>
            </div>
            <div id="letters-container"></div>
        </div>

        <div id="msg" style="text-align: center; font-weight: bold; font-size: 22px; color: var(--success); height: 30px;"></div>

        <div class="nav-bar">
            <button id="prev-btn" class="btn-round btn-prev" onclick="changeWord(-1)">⬅️ Zurück</button>
            <button id="next-btn" class="btn-round btn-next" onclick="changeWord(1)">Weiter ➡️</button>
        </div>
        <button id="finish-btn" class="btn-round btn-finish" onclick="endGame()">🏁 Ergebnisse anzeigen</button>
    </div>

    <div id="end-screen" class="screen" style="text-align: center;">
        <h1 style="font-size: 45px;">Fertig! 🏆</h1>
        <div id="final-stats" style="font-size: 20px; margin: 20px 0; line-height: 1.6;"></div>
        <button class="btn-round btn-next" onclick="location.reload()" style="margin-bottom: 10px;">🔄 Erneut spielen</button>
        <button id="hard-btn" class="btn-round btn-finish" style="display:block; background: var(--purple);" onclick="startGame('hard')">🔥 Schwere Verben</button>
    </div>

</div>

<script>
    const normalWords = [
        { s: "CEHULS", t: "SCHULE" }, { s: "NEDURF", t: "FREUND" }, { s: "USAH", t: "HAUS" },
        { s: "TRUMET", t: "MUTTER" }, { s: "RSESAW", t: "WASSER" }, { s: "HCI", t: "ICH" },
        { s: "LAPFE", t: "APFEL" }, { s: "TSTAD", t: "STADT" }, { s: "GTA", t: "TAG" },
        { s: "ROTB", t: "BROT" }, { s: "NEOSN", t: "SONNE" }, { s: "NMDU", t: "MUND" },
        { s: "HISCT", t: "TISCH" }, { s: "RHELER", t: "LEHRER" }, { s: "ZAKET", t: "KATZE" },
        { s: "UDHN", t: "HUND" }, { s: "UHCB", t: "BUCH" }, { s: "ENREG", t: "REGEN" },
        { s: "LUMEB", t: "BLUME" }, { s: "NEHGE", t: "GEHEN" }
    ];
    const hardWords = [
        { s: "TUGNEZI", t: "ZEITUNG" }, { s: "LELNKIGN", t: "KLINGELN" },
        { s: "RCHPESNE", t: "SPRECHEN" }, { s: "NAFAGNEN", t: "ANFANGEN" },
        { s: "SGEEINSNE", t: "GENIESSEN" }
    ];

    let currentList = [], currentIndex = 0, currentLetters = [], selectedIdx = null;
    let solvedCount = 0, seconds = 0, timer, movesInCurrentWord = 0;
    let hintsUsed = { h1: false, h2: false };

    function startGame(mode) {
        currentList = (mode === 'hard') ? hardWords : normalWords;
        currentIndex = 0; solvedCount = 0; seconds = 0;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('game-screen').classList.add('active');
        startTimer();
        loadWord();
    }

    function startTimer() {
        clearInterval(timer);
        timer = setInterval(() => {
            seconds++;
            const m = Math.floor(seconds/60).toString().padStart(2,'0');
            const s = (seconds%60).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    function loadWord() {
        selectedIdx = null;
        movesInCurrentWord = 0;
        hintsUsed = { h1: false, h2: false };
        currentLetters = currentList[currentIndex].s.split("");
        document.getElementById('msg').innerText = "";
        updateHintButtons();
        render();
    }

    function render() {
        const container = document.getElementById('letters-container');
        container.innerHTML = "";
        document.getElementById('progress').innerText = `Wort ${currentIndex + 1} / ${currentList.length}`;
        document.getElementById('prev-btn').disabled = currentIndex === 0;
        document.getElementById('next-btn').disabled = currentIndex === currentList.length - 1;
        document.getElementById('finish-btn').style.display = (currentIndex === currentList.length - 1) ? "block" : "none";

        const isSolved = currentLetters.join("") === currentList[currentIndex].t;

        currentLetters.forEach((l, i) => {
            const div = document.createElement('div');
            div.className = 'letter';
            if(i === selectedIdx) div.classList.add('selected');
            if(isSolved) div.classList.add('correct-state');
            if(hintsUsed.h1 && i === 0 && !isSolved) div.classList.add('locked');
            if(hintsUsed.h2 && i === currentLetters.length - 1 && !isSolved) div.classList.add('locked');

            div.innerText = l;
            div.onclick = () => handleSwap(i);
            container.appendChild(div);
        });
    }

    function handleSwap(i) {
        if(currentLetters.join("") === currentList[currentIndex].t) return;
        
        // Nepřesouvat zamčená písmena z nápovědy
        if(hintsUsed.h1 && i === 0) return;
        if(hintsUsed.h2 && i === currentLetters.length - 1) return;

        if(selectedIdx === null) {
            selectedIdx = i;
        } else {
            if(selectedIdx !== i) {
                const temp = currentLetters[selectedIdx];
                currentLetters[selectedIdx] = currentLetters[i];
                currentLetters[i] = temp;
                movesInCurrentWord++;
                updateHintButtons();
            }
            selectedIdx = null;
            check();
        }
        render();
    }

    function updateHintButtons() {
        const btn1 = document.getElementById('hint-1');
        const btn2 = document.getElementById('hint-2');
        const lbl1 = document.getElementById('hint-1-label');
        const lbl2 = document.getElementById('hint-2-label');

        if(!hintsUsed.h1) {
            btn1.disabled = movesInCurrentWord < 10;
            lbl1.innerText = `${Math.min(movesInCurrentWord, 10)}/10`;
        } else {
            btn1.disabled = true;
            lbl1.innerText = "AKTIV";
        }

        if(!hintsUsed.h2) {
            btn2.disabled = movesInCurrentWord < 30;
            lbl2.innerText = `${Math.min(movesInCurrentWord, 30)}/30`;
        } else {
            btn2.disabled = true;
            lbl2.innerText = "AKTIV";
        }
    }

    function useHint(type) {
        const target = currentList[currentIndex].t;
        if(type === 1) {
            const pos = currentLetters.indexOf(target[0]);
            [currentLetters[0], currentLetters[pos]] = [currentLetters[pos], currentLetters[0]];
            hintsUsed.h1 = true;
        } else {
            const lastChar = target[target.length-1];
            const pos = currentLetters.lastIndexOf(lastChar);
            const targetPos = currentLetters.length - 1;
            [currentLetters[targetPos], currentLetters[pos]] = [currentLetters[pos], currentLetters[targetPos]];
            hintsUsed.h2 = true;
        }
        updateHintButtons();
        check();
        render();
    }

    function check() {
        if(currentLetters.join("") === currentList[currentIndex].t) {
            solvedCount++;
            document.getElementById('msg').innerText = "Richtig! ✨🥳";
            createConfetti();
        }
    }

    function createConfetti() {
        for(let i=0; i<40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = '50%'; p.style.top = '50%';
            p.style.background = `hsl(${Math.random()*360}, 100%, 50%)`;
            p.style.setProperty('--x', (Math.random()-0.5)*400 + 'px');
            p.style.setProperty('--y', (Math.random()-0.5)*400 + 'px');
            document.getElementById('app-container').appendChild(p);
            setTimeout(() => p.remove(), 800);
        }
    }

    function changeWord(dir) {
        currentIndex += dir;
        loadWord();
    }

    function endGame() {
        clearInterval(timer);
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('end-screen').classList.add('active');
        const m = Math.floor(seconds/60); const s = seconds%60;
        document.getElementById('final-stats').innerHTML = 
            `Gesammelte Wörter: <strong>${solvedCount} / ${currentList.length}</strong><br>` +
            `Zeit: <strong>${m}m ${s}s</strong><br>Gut gemacht! 🎉`;
    }
</script>
</body>
</html>
